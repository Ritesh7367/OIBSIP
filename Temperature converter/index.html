<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <h1>Temperature Converter</h1>
        <div class="input">
            <div class="degree">
                <label for="degree">Degree:</label>
                <input type="number" id="degree" placeholder="Enter temperature">
            </div>
            <div class="unit">
                 <label for="unit">Unit:</label>
                <select id="unit">
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="kelvin">Kelvin</option>
                </select>
             </div>  
        </div>
        <div class="result">
            <div class="result-degree">
                <label for="result-degree">Result:</label>
                <input type="number" id="result-degree" readonly>
            </div>
            <div class="result-unit">
                <label for="result-unit">R-Unit:</label>
                <select id="result-unit">
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="kelvin">Kelvin</option>
                </select>
            </div>

        </div>


        <button id="convert" onclick="convertTemperature()">Convert</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
